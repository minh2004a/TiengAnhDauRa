                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }

                // 2. Xáo trộn các phương án A,B,C,D
                return shuffled.map((q) => {
                    let optionsMap = q.options.map((opt, index) => ({
                        text: opt,
                        isCorrect: index === q.answer,
                    }));

                    for (let i = optionsMap.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [optionsMap[i], optionsMap[j]] = [
                            optionsMap[j],
                            optionsMap[i],
                        ];
                    }

                    let newAnswerIndex = 0;
                    let newOptions = optionsMap.map((item, index) => {
                        if (item.isCorrect) newAnswerIndex = index;
                        return item.text;
                    });

                    return {
                        ...q,
                        options: newOptions,
                        answer: newAnswerIndex,
                    };
                });
            }

            function renderQuiz() {
                quizContainer.innerHTML = "";
                currentQuestions.forEach((q, qIndex) => {
                    const questionDiv = document.createElement("div");
                    questionDiv.className =
                        "bg-gray-50 p-5 rounded-lg border border-gray-200 shadow-sm question-block";
                    questionDiv.id = `question-${qIndex}`;

                    const questionTitle = document.createElement("h3");
                    questionTitle.className =
                        "text-lg font-semibold text-gray-800 mb-4";
                    // Đánh số thứ tự tăng dần 1, 2, 3...
                    questionTitle.innerHTML = `<span class="text-blue-600">Câu ${qIndex + 1}:</span> ${q.question}`;
                    questionDiv.appendChild(questionTitle);

                    const optionsDiv = document.createElement("div");
                    optionsDiv.className = "space-y-2";

                    q.options.forEach((opt, optIndex) => {
                        const label = document.createElement("label");
                        label.className =
                            "flex items-center p-3 border rounded-md cursor-pointer hover:bg-gray-100 transition duration-200 option-label";
                        label.id = `label-${qIndex}-${optIndex}`;

                        const input = document.createElement("input");
                        input.type = "radio";
                        input.name = `question-${qIndex}`;
                        input.value = optIndex;
                        input.className =
                            "w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500";

                        const textSpan = document.createElement("span");
                        textSpan.className = "ml-3 text-gray-700";
                        textSpan.innerHTML = `<span class="font-bold mr-1">${letters[optIndex]}.</span> ${opt}`;

                        label.appendChild(input);
                        label.appendChild(textSpan);
                        optionsDiv.appendChild(label);
                    });

                    const feedbackDiv = document.createElement("div");
                    feedbackDiv.id = `feedback-${qIndex}`;
                    feedbackDiv.className = "mt-3 hidden";

                    questionDiv.appendChild(optionsDiv);
                    questionDiv.appendChild(feedbackDiv);
                    quizContainer.appendChild(questionDiv);
                });
            }

            function checkAnswers() {
                let score = 0;
                const allInputs = document.querySelectorAll(
                    'input[type="radio"]',
                );
                allInputs.forEach((input) => (input.disabled = true));

                currentQuestions.forEach((q, qIndex) => {
                    const selected = document.querySelector(
                        `input[name="question-${qIndex}"]:checked`,
                    );
                    const feedbackDiv = document.getElementById(
                        `feedback-${qIndex}`,
                    );
                    const correctLabel = document.getElementById(
                        `label-${qIndex}-${q.answer}`,
                    );

                    correctLabel.classList.add("correct-answer");

                    if (selected) {
                        const selectedValue = parseInt(selected.value);
                        const selectedLabel = document.getElementById(
                            `label-${qIndex}-${selectedValue}`,
                        );

                        if (selectedValue === q.answer) {
                            score++;
                            feedbackDiv.innerHTML =
                                '✅ <span class="correct-text">Chính xác!</span>';
                            feedbackDiv.classList.remove("hidden");
                        } else {
                            selectedLabel.classList.add("wrong-answer");
                            feedbackDiv.innerHTML = `❌ <span class="wrong-text">Sai rồi!</span> Đáp án đúng là <b>${letters[q.answer]}</b>.`;
                            feedbackDiv.classList.remove("hidden");
                        }
                    } else {
                        feedbackDiv.innerHTML = `⚠️ <span class="text-yellow-600 font-bold">Bạn chưa trả lời!</span> Đáp án đúng là <b>${letters[q.answer]}</b>.`;
                        feedbackDiv.classList.remove("hidden");
                    }
                });

                submitBtn.classList.add("hidden");
                resultContainer.classList.remove("hidden");
                scoreText.innerHTML = `Bạn trả lời đúng <span class="font-bold text-blue-700 text-3xl">${score}/${currentQuestions.length}</span> câu.`;

                resultContainer.scrollIntoView({ behavior: "smooth" });
            }

            function resetQuiz() {
                submitBtn.classList.remove("hidden");
                resultContainer.classList.add("hidden");

                if (shuffleCheckbox.checked) {
                    currentQuestions =
                        shuffleQuestionsAndOptions(currentDataSource);
                } else {
                    currentQuestions = JSON.parse(
                        JSON.stringify(currentDataSource),
                    ); // Deep copy
                }

                renderQuiz();
                window.scrollTo({ top: 0, behavior: "smooth" });
            }

            function setActiveTab(tab) {
                if (tab === "listening") {
                    tabListening.classList.add("bg-blue-600", "text-white");
                    tabListening.classList.remove(
                        "bg-gray-200",
                        "text-gray-700",
                    );
                    tabReading.classList.add("bg-gray-200", "text-gray-700");
                    tabReading.classList.remove("bg-blue-600", "text-white");
                    currentDataSource = listeningData;
                    sectionTitle.innerText =
                        "Phần Nghe (Part 3, 4) - Câu 32 đến 100";
                } else {
                    tabReading.classList.add("bg-blue-600", "text-white");
                    tabReading.classList.remove("bg-gray-200", "text-gray-700");
                    tabListening.classList.add("bg-gray-200", "text-gray-700");
                    tabListening.classList.remove("bg-blue-600", "text-white");
                    currentDataSource = readingData;
                    sectionTitle.innerText = `Phần Đọc (Reading) - Tổng hợp ${readingData.length} Câu`;
                }
                resetQuiz();
            }

            shuffleCheckbox.addEventListener("change", resetQuiz);
            tabListening.addEventListener("click", () =>
                setActiveTab("listening"),
            );
            tabReading.addEventListener("click", () => setActiveTab("reading"));

            submitBtn.addEventListener("click", checkAnswers);
            retryBtn.addEventListener("click", resetQuiz);

            // Khởi chạy mặc định với tab Listening
            resetQuiz();
        </script>
    </body>
</html>
